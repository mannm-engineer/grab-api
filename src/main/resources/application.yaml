spring:
  datasource:
    url: ${DATASOURCE_URL}
    username: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD}
  sql:
    init:
      mode: always
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: grab-api

server:
  servlet:
    context-path: /api

app:
  storage:
    path: ./uploads
  kafka:
    topics:
      driver-events: driver-events
      ride-events: ride-events

outbox:
  batch-size: 50
