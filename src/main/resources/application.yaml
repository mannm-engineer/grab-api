spring:
  datasource:
    url: ${DATASOURCE_URL}
    username: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD}
  sql:
    init:
      mode: always
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

server:
  servlet:
    context-path: /api

app:
  storage:
    path: ./uploads

outbox:
  batch-size: 50

driver:
  api:
    base-url: ${DRIVER_API_BASE_URL:http://localhost:8081}
