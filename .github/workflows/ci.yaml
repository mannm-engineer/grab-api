name: Continuous Integration

on:
  push:
    branches: ["master"]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # 1️⃣ Checkout source code
      # =========================
      - name: Checkout source
        uses: actions/checkout@v4

      # =========================
      # 2️⃣ Set up JDK 25 for Maven
      # =========================
      - name: Set up JDK 25
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 25

      # =========================
      # 3️⃣ Cache Maven dependencies
      # =========================
      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # =========================
      # 4️⃣ Build and test with Maven
      # =========================
      - name: Build and test
        run: mvn -B clean package

      # =========================
      # 5️⃣ Set up Docker Buildx
      # =========================
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # =========================
      # 6️⃣ Log in to Docker Hub
      # =========================
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # =========================
      # 7️⃣ Build and push Docker image
      # =========================
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            mannmengineer/grab-api:latest
            mannmengineer/grab-api:${{ github.sha }}

      # =========================
      # 8️⃣ Copy k8s.yaml to Bastion
      # =========================
      - name: Copy k8s.yaml to Bastion
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.BASTION_HOST }}
          username: ${{ secrets.BASTION_USER }}
          key: ${{ secrets.BASTION_SSH_KEY }}
          source: "k8s.yaml"
          target: "/home/${{ secrets.BASTION_USER }}/"

      # =========================
      # 9️⃣ Deploy to Kubernetes via Bastion
      # =========================
      - name: Deploy to Kubernetes via Bastion
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.BASTION_HOST }}
          username: ${{ secrets.BASTION_USER }}
          key: ${{ secrets.BASTION_SSH_KEY }}
          script: |
            set -e

            # Create secrets in Kubernetes
            kubectl create secret generic grab-api-secrets \
              --from-literal=DATASOURCE_USERNAME='${{ secrets.DATASOURCE_USERNAME }}' \
              --from-literal=DATASOURCE_PASSWORD='${{ secrets.DATASOURCE_PASSWORD }}' \
              --from-literal=FIREBASE_PRIVATE_KEY='${{ secrets.FIREBASE_PRIVATE_KEY }}' \
              --dry-run=client -o yaml | kubectl apply -f -

            # Apply k8s manifests
            echo "▶ Applying Kubernetes manifests"
            kubectl apply -f ~/k8s.yaml

            # Update API image
            echo "▶ Updating API image"
            kubectl set image deployment/grab-api \
              grab-api=mannmengineer/grab-api:${{ github.sha }}

            # Wait for rollout
            echo "▶ Waiting for rollout"
            kubectl rollout status deployment/grab-api
